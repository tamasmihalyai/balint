<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graz Höhenarbeiten</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f1ea;
      color: #182126;
    }

    main {
      width: min(100% - 32px, 520px);

    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 20px;
      color: #5d686f;
    }

    a {
      display: inline-flex;
      margin: 6px;
      padding: 12px 16px;
      border-radius: 999px;
      background: #182126;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Graz Höhenarbeiten</h1>
    <p>Choose a language.</p>
    <a href="/en">English</a>
    <a href="/at">Deutsch</a>
  </main>
